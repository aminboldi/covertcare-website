kind = "web"
previewPath = "/"
title = "CovertCare"
version = "1.0.0"
id = "artifacts/covertcare-site"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24737

[services.development]
run = "pnpm --filter @workspace/covertcare-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/covertcare-site", "run", "build" ]
serve = "static"
publicDir = "artifacts/covertcare-site/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24737"
BASE_PATH = "/"
