kind = "slides"
previewPath = "/pitch/"
title = "CovertCare Partner Pitch Deck"
version = "1.0.0"
id = "artifacts/pitch-deck"
router = "path"

[[services]]
name = "web"
paths = [ "/pitch/" ]
localPort = 18522

[services.development]
run = "pnpm --filter @workspace/pitch-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pitch-deck", "run", "build" ]
serve = "static"
publicDir = "artifacts/pitch-deck/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18522"
BASE_PATH = "/pitch/"
